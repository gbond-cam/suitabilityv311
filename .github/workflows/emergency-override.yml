name: Emergency Override Control

on:
  pull_request:

jobs:
  emergency-override-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/github-script@v8
      with:
        script: |
          const pr = context.payload.pull_request;
          const labels = pr.labels.map(l => l.name);

          const isEmergency = labels.includes("EMERGENCY-OVERRIDE");

          if (!isEmergency) {
            core.info("✅ No emergency override requested");
            return;
          }

          const author = pr.user.login;

          const reviews = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number
          });

          const approvals = reviews.data
            .filter(r => r.state === "APPROVED")
            .map(r => r.user.login);

          const uniqueApprovers = [...new Set(approvals)].filter(a => a !== author);

          if (uniqueApprovers.length < 1) {
            core.setFailed(
              "❌ Emergency override requires at least ONE independent emergency approver."
            );
          }

          core.warning(
            "⚠️ EMERGENCY OVERRIDE ACTIVE — Post-incident review is mandatory."
          );