name: Enforce Emergency Incident SLA

on:
  pull_request:
    branches: ["main"]

jobs:
  enforce-incident-sla:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce emergency incident closure SLA
        uses: actions/github-script@v8
        with:
          script: |
            const SLA_DAYS = 7;
            const now = new Date();

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,emergency-override'
            });

            const breaches = [];

            for (const issue of issues.data) {
              const created = new Date(issue.created_at);
              const ageDays = (now - created) / (1000 * 60 * 60 * 24);

              if (ageDays > SLA_DAYS) {
                breaches.push({
                  number: issue.number,
                  title: issue.title,
                  age: ageDays.toFixed(1)
                });
              }
            }

            if (breaches.length > 0) {
              const message = [
                '❌ Release blocked – Emergency Incident SLA breached.',
                '',
                `The following emergency incidents exceed the ${SLA_DAYS}-day SLA:`,
                '',
                ...breaches.map(b => `#${b.number} – ${b.title} (${b.age} days old)`),
                '',
                'All emergency incidents must be reviewed and CLOSED before release.'
              ].join('\n');

              core.setFailed(message);
              return;
            }

            core.info('✅ No emergency incident SLA breaches detected');