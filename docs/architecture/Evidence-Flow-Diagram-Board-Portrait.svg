    Evidence Controls – Board Overview
  </text>

  <!-- Box style note -->
  <text x="397" y="90"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12"
        text-anchor="middle">
    High‑level view of how advice evidence is controlled and verified
  </text>

  <!-- Intake -->
  <rect x="197" y="140" width="400" height="70"
        fill="#f9fafb" stroke="#333333" stroke-width="1.3"/>
  <text x="397" y="170"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        text-anchor="middle">
    Evidence Intake
  </text>
  <text x="397" y="192"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12"
        text-anchor="middle">
