name: Approve Canonical Template Changes

on:
  pull_request:

jobs:
  detect-canonical-changes:
    runs-on: ubuntu-latest
    outputs:
      canonical_changed: ${{ steps.filter.outputs.canonical }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            canonical:
              - 'SuitabilityWriter.v3/artefacts/templates/**'
              - 'SuitabilityWriter.v3/governance/canonical-bootstrap.sha256'

  approval-gate:
    runs-on: ubuntu-latest
    needs: detect-canonical-changes
    if: ${{ needs.detect-canonical-changes.outputs.canonical_changed == 'true' }}
    steps:
      - name: Require governance approval
        run: |
          echo "❌ Canonical bootstrap templates have changed."
          echo ""
          echo "This requires:"
          echo " - Explicit approval from CODEOWNERS"
          echo " - Documented reason in PR description"
          echo ""
          echo "Without approval, this PR must not be merged."
          exit 1