  <line x1="397" y1="320" x2="397" y2="360"
        stroke="#333333" stroke-width="1.6"
        marker-end="url(#arrow)"/>

  <line x1="397" y1="430" x2="397" y2="470"
        stroke="#333333" stroke-width="1.6"
        marker-end="url(#arrow)"/>

  <line x1="397" y1="540" x2="397" y2="580"
        stroke="#333333" stroke-width="1.6"
        marker-end="url(#arrow)"/>

  <line x1="397" y1="650" x2="397" y2="690"
        stroke="#333333" stroke-width="1.6"
        marker-end="url(#arrow)"/>

  <line x1="397" y1="780" x2="397" y2="820"
        stroke="#333333" stroke-width="1.6"
        marker-end="url(#arrow)"/>

</svg>
