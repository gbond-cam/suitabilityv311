trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self

  - task: PowerShell@2
    displayName: Run delivery gate
    inputs:
      pwsh: true
      targetType: inline
      script: |
        ./delivery.gate.check.ps1

  - task: PowerShell@2
    displayName: Check environment contracts
    inputs:
      pwsh: true
      targetType: inline
      script: |
        ./infra/env/check-env-contracts.ps1

  - task: PowerShell@2
    displayName: Check Key Vault mappings
    inputs:
      pwsh: true
      targetType: inline
      script: |
        ./infra/env/check-keyvault-mapping.ps1

  - task: PowerShell@2
    displayName: Pre-deploy re-check
    condition: succeeded()
    inputs:
      pwsh: true
      targetType: inline
      script: |
        ./deploy/pre-deploy-recheck.ps1 `
          -Environment prod `
          -SubscriptionId "$(AZURE_SUBSCRIPTION_ID)"

  - task: PowerShell@2
    displayName: Export deployment evidence
    condition: succeeded()
    inputs:
      pwsh: true
      targetType: inline
      script: |
        ./deploy/export-deployment-evidence.ps1 `
          -Environment prod `
          -DeploymentId "$(Release.ReleaseId)"
