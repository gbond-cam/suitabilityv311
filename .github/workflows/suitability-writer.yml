name: Delivery Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  delivery-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PowerShell
        uses: PowerShell/PowerShell@v2

      - name: Run delivery gate
        shell: pwsh
        run: |
          ./delivery.gate.check.ps1

  governance-checks:
    runs-on: ubuntu-latest
    needs: delivery-gate
    if: ${{ success() }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PowerShell
        uses: PowerShell/PowerShell@v2

      - name: Check environment contracts
        shell: pwsh
        run: |
          ./infra/env/check-env-contracts.ps1

      - name: Check Key Vault mappings
        shell: pwsh
        run: |
          ./infra/env/check-keyvault-mapping.ps1

      - name: Pre-deploy re-check
        shell: pwsh
        run: |
          ./deploy/pre-deploy-recheck.ps1 `
            -Environment prod `
            -SubscriptionId ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Export deployment evidence
        shell: pwsh
        run: |
          ./deploy/export-deployment-evidence.ps1 `
            -Environment prod `
            -DeploymentId ${{ github.run_id }}