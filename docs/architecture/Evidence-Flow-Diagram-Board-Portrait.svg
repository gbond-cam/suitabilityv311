  </text>
  <text x="397" y="412"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12"
        text-anchor="middle">
    Approved templates and rules used
  </text>

  <!-- Lineage -->
  <rect x="197" y="470" width="400" height="70"
