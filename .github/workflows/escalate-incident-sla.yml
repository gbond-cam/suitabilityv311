name: Escalate Emergency Incident SLA

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  escalate-incidents:
    runs-on: ubuntu-latest
    steps:
      - name: Check incident SLA and escalate if required
        uses: actions/github-script@v8
        with:
          script: |
            const SLA_DAYS = 7;
            const WARN_AT = 4;
            const CRITICAL_AT = 6;
            const now = new Date();

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,emergency-override'
            });

            for (const issue of issues.data) {
              const created = new Date(issue.created_at);
              const ageDays = (now - created) / (1000 * 60 * 60 * 24);
              let message = null;

              if (ageDays >= CRITICAL_AT && ageDays < SLA_DAYS) {
                message = [
                  '🚨 **CRITICAL SLA WARNING**',
                  '',
                  `This emergency incident is **${ageDays.toFixed(1)} days old**.`,
                  '',
                  `⏰ **SLA breach imminent** (>${SLA_DAYS} days).`,
                  '',
                  'Immediate action required:',
                  '- Complete post‑incident review',
                  '- Close incident or normalise change'
                ].join('\n');
              } else if (ageDays >= WARN_AT && ageDays < CRITICAL_AT) {
                message = [
                  '⚠️ **SLA WARNING**',
                  '',
                  `This emergency incident is **${ageDays.toFixed(1)} days old**.`,
                  '',
                  'Please ensure post‑incident review is completed before SLA breach.'
                ].join('\n');
              }

              if (message) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `${message}\n\n@GrahamBond @ComplianceOwner`
                });

                core.warning(`Escalation posted on incident #${issue.number}`);
              }
            }