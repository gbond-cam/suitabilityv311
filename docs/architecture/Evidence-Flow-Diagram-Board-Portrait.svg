  </text>

  <!-- Validation -->
  <rect x="197" y="250" width="400" height="70"
        fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="397" y="280"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        text-anchor="middle">
