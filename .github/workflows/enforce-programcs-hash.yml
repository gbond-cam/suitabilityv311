name: Enforce Program.cs Hash Consistency

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  enforce-programcs-hash:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Calculate canonical Program.cs hash
      id: canonical
      working-directory: SuitabilityWriter.v3
      run: |
        set -e
        CANONICAL="Templates/Program.cs"

        if [ ! -f "$CANONICAL" ]; then
          echo "ℹ️ No canonical Program.cs configured at $CANONICAL; skipping hash enforcement."
          echo "canonical_present=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        HASH=$(sha256sum "$CANONICAL" | awk '{print $1}')
        echo "canonical_present=true" >> $GITHUB_OUTPUT
        echo "canonical_hash=$HASH" >> $GITHUB_OUTPUT
        echo "✅ Canonical hash: $HASH"

    - name: Enforce identical Program.cs across templated services
      if: steps.canonical.outputs.canonical_present == 'true'
      working-directory: SuitabilityWriter.v3
      run: |
        set -e
        EXPECTED="${{ steps.canonical.outputs.canonical_hash }}"

        for FILE in $(find src -name Program.cs); do
          CURRENT=$(sha256sum "$FILE" | awk '{print $1}')
          echo "🔍 $FILE → $CURRENT"

          if [ "$CURRENT" != "$EXPECTED" ]; then
            echo "❌ Hash mismatch in $FILE"
            echo "   Expected: $EXPECTED"
            echo "   Found:    $CURRENT"
            exit 1
          fi
        done

        echo "✅ All Program.cs files match canonical hash"