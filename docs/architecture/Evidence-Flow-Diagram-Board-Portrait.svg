  </text>

  <!-- Decision -->
  <rect x="197" y="360" width="400" height="70"
        fill="#f9fafb" stroke="#333333" stroke-width="1.3"/>
  <text x="397" y="390"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        text-anchor="middle">
