name: Enforce Four-Eyes Approval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  four-eyes-check:
    runs-on: ubuntu-latest

    steps:
    - name: Enforce four-eyes principle
      uses: actions/github-script@v8
      with:
        script: |
          const pr = context.payload.pull_request;
          const author = pr.user.login;

          const reviews = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: pr.number
          });

          const approvals = reviews.data
            .filter(r => r.state === "APPROVED")
            .map(r => r.user.login);

          const uniqueApprovers = [...new Set(approvals)];
          const validApprovers = uniqueApprovers.filter(a => a !== author);

          if (validApprovers.length < 2) {
            core.setFailed(
              `❌ Four-eyes rule violated.
               At least 2 independent approvers are required.
               Author: ${author}
               Approvers: ${validApprovers.join(", ") || "none"}`
            );
          } else {
            core.info(`✅ Four-eyes satisfied. Approvers: ${validApprovers.join(", ")}`);
          }