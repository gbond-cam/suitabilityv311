            markerHeight="10"
            refX="10"
            refY="5"
            orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="397" y="60"
