  <text x="397" y="505" font-size="14" text-anchor="middle">Audit Trail</text>
  <text x="397" y="528" font-size="12" text-anchor="middle">
    SYSC 9.1 – Audit trail and reconstruction
  </text>
  <text x="397" y="548" font-size="12" text-anchor="middle">
    Consumer Duty: Consumer Support
  </text>

  <!-- Evidence Package -->
  <rect x="197" y="600" width="400" height="95"
