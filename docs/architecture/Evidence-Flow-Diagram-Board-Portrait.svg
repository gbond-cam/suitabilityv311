  <rect x="197" y="690" width="400" height="90"
        fill="#eef2ff" stroke="#1e3a8a" stroke-width="1.5"/>
  <text x="397" y="720"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        text-anchor="middle">
