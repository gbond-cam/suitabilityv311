  <line x1="397" y1="455" x2="397" y2="480" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="397" y1="575" x2="397" y2="600" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="397" y1="695" x2="397" y2="720" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="397" y1="835" x2="397" y2="860" stroke="#333" stroke-width="1.6" marker-end="url(#arrow)"/>

